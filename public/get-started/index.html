<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Get Started — Pal by GetBotPacks</title>
  <meta name="description" content="Set up your personal AI in 30 seconds.">
  <link rel="icon" href="/assets/pal-brain.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg: linear-gradient(180deg, #a855f7 0%, #7c3aed 50%, #6d28d9 100%);
      --card:#1e1a3a;--border:rgba(255,255,255,0.15);
      --accent:#a855f7;--accent-hover:#9333ea;--accent-light:rgba(168,85,247,0.2);
      --text:#ffffff;--text-muted:#e2e8f0;
      --danger:#ef4444;--success:#10b981;
      --radius:14px;--radius-sm:10px;
    }
    html,body{min-height:100%;background:linear-gradient(180deg,#a855f7 0%,#7c3aed 50%,#6d28d9 100%);background-attachment:fixed;color:var(--text);font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
    /* Nav */
    .top-nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(124,58,237,0.7);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.12);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 20px}
    .nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;font-size:1rem;font-weight:800;color:#ffffff}
    .nav-logo img{width:28px;height:28px;border-radius:50%}
    .nav-signin{font-size:0.85rem;color:#e9d5ff;text-decoration:none;font-weight:600}
    /* Page */
    .page-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:72px 20px 40px}
    /* Onboarding container */
    #onboarding{width:100%;max-width:420px}
    /* Step dots */
    .step-dots{display:flex;justify-content:center;gap:8px;margin-bottom:28px}
    .step-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all .2s}
    .step-dot.active{background:var(--accent);width:24px;border-radius:4px}
    .step-dot.done{background:var(--accent);opacity:0.5}
    /* Steps */
    .onboarding-step{display:none;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);border-radius:20px;padding:32px 28px;flex-direction:column;backdrop-filter:blur(12px);}
    .onboarding-step.active{display:flex}
    .step-header{text-align:center;margin-bottom:28px}
    .step-header h2{font-size:1.6rem;font-weight:800;color:#ffffff;margin-bottom:8px}
    .step-header p{font-size:0.9rem;color:#e2e8f0}
    /* Fields */
    .field-group{margin-bottom:16px}
    .field-input{width:100%;background:rgba(0,0,0,0.25);border:1.5px solid rgba(255,255,255,0.2);border-radius:var(--radius-sm);padding:12px 14px;font-size:0.95rem;color:#ffffff;font-family:inherit;transition:border-color .15s;}
    .field-input:focus{outline:none;border-color:var(--accent)}
    /* Buttons */
    .btn-primary{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:14px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;margin-top:8px}
    .btn-primary:hover{background:var(--accent-hover)}
    .btn-primary:disabled{opacity:0.5;cursor:not-allowed}
    .btn-secondary{width:100%;background:transparent;color:rgba(255,255,255,0.7);border:1.5px solid rgba(255,255,255,0.25);border-radius:var(--radius);padding:12px;font-size:0.9rem;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px}
    .btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
    /* Slug feedback */
    .slug-feedback{font-size:0.82rem;min-height:18px;text-align:center;margin-top:6px}
    .slug-feedback.ok{color:#86efac}
    .slug-feedback.error{color:#fca5a5}
    .slug-feedback.checking{color:rgba(255,255,255,0.6)}
    /* Error text */
    #pw-error{font-size:0.85rem;color:#fca5a5;min-height:16px;text-align:center;margin:4px 0 8px}
    /* Board URL display */
    #ob-board-url{background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.2);border-radius:var(--radius-sm);padding:14px 16px;font-family:monospace;font-size:0.9rem;color:#e9d5ff;text-align:center;margin-bottom:16px;word-break:break-all}
    /* Ready checkmark */
    .ready-icon{font-size:3rem;text-align:center;margin-bottom:8px}
  </style>
</head>
<body>

<nav class="top-nav">
  <a href="/" class="nav-logo">
    <img src="/assets/pal-brain.png" alt="Pal">
    Pal
  </a>
  <a href="/signin" class="nav-signin">Sign in →</a>
</nav>

<div class="page-wrap">
  <div id="onboarding">

    <!-- Step dots -->
    <div class="step-dots">
      <div class="step-dot active" id="dot-0"></div>
      <div class="step-dot" id="dot-1"></div>
      <div class="step-dot" id="dot-2"></div>
    </div>

    <!-- Step 0: Your link -->
    <div class="onboarding-step active" id="ob-step-0">
      <div class="step-header">
        <div style="margin:0 auto 14px;width:64px;height:64px;">
          <img src="/assets/pal-brain.png" style="width:64px;height:64px;object-fit:contain;border-radius:50%;filter:drop-shadow(0 0 10px rgba(124,58,237,0.5));">
        </div>
        <h2>Your Pal link</h2>
        <p>Pick your personal address — takes 30 seconds.</p>
      </div>
      <div class="field-group">
        <input class="field-input" id="ob-slug" type="text" placeholder="yourname" maxlength="32"
          autocomplete="off" autocapitalize="none" spellcheck="false"
          style="text-align:center;font-size:1.1rem;font-weight:600;">
        <p style="margin:10px 0 0;font-size:0.9rem;color:var(--text-muted);text-align:center;">
          <strong style="color:var(--accent);"><span id="slug-preview">yourname</span>.getbotpacks.com</strong>
        </p>
        <div class="slug-feedback" id="slug-feedback"></div>
      </div>
      <button class="btn-primary" id="ob-step0-next" disabled>Set password →</button>
    </div>

    <!-- Step 1: Password -->
    <div class="onboarding-step" id="ob-step-1">
      <div class="step-header">
        <div style="margin:0 auto 14px;width:64px;height:64px;">
          <img src="/assets/pal-brain.png" style="width:64px;height:64px;object-fit:contain;border-radius:50%;filter:drop-shadow(0 0 10px rgba(124,58,237,0.5));">
        </div>
        <h2>Choose your password</h2>
        <p>Your Pal is private — only you can access it.</p>
      </div>
      <div class="field-group">
        <input class="field-input" id="ob-password" type="password"
          placeholder="At least 8 characters" minlength="8" autocomplete="new-password">
      </div>
      <div class="field-group">
        <input class="field-input" id="ob-password-confirm" type="password"
          placeholder="Confirm password" autocomplete="new-password">
      </div>
      <div id="pw-error"></div>
      <button class="btn-primary" id="ob-step1-next">Create my Pal →</button>
      <button class="btn-secondary" id="ob-step1-back">← Back</button>
    </div>

    <!-- Step 2: Ready -->
    <div class="onboarding-step" id="ob-step-2">
      <div class="step-header" style="padding-top:16px;">
        <div class="ready-icon">🎉</div>
        <div style="margin:0 auto 14px;width:72px;height:72px;">
          <img src="/assets/pal-brain.png" style="width:72px;height:72px;object-fit:contain;border-radius:50%;filter:drop-shadow(0 0 16px rgba(124,58,237,0.7));">
        </div>
        <h2>Your Pal is ready.</h2>
        <p>Smart like GPT — but with hands to do stuff.</p>
      </div>
      <div id="ob-board-url"></div>
      <button class="btn-primary" id="ob-start-chat">Start chatting →</button>
    </div>

  </div>
</div>

<script>
'use strict';

let slugAvailable = false;
let slugCheckTimer = null;
let currentSlug = '';

// ── Step navigation ────────────────────────────────────────────
function setStep(n) {
  document.querySelectorAll('.onboarding-step').forEach((el, i) => {
    el.classList.toggle('active', i === n);
  });
  ['dot-0','dot-1','dot-2'].forEach((id, i) => {
    const d = document.getElementById(id);
    if (!d) return;
    d.classList.toggle('active', i === n);
    d.classList.toggle('done', i < n);
  });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Slug input ─────────────────────────────────────────────────
document.getElementById('ob-slug').addEventListener('input', function() {
  const val = this.value.toLowerCase().replace(/[^a-z0-9-]/g, '').slice(0, 32);
  if (this.value !== val) this.value = val;

  const preview = document.getElementById('slug-preview');
  if (preview) preview.textContent = val || 'yourname';

  const fb = document.getElementById('slug-feedback');
  const btn = document.getElementById('ob-step0-next');
  slugAvailable = false;
  btn.disabled = true;

  clearTimeout(slugCheckTimer);

  if (val.length < 3) {
    fb.textContent = val.length ? 'Too short — minimum 3 characters.' : '';
    fb.className = 'slug-feedback error';
    return;
  }

  fb.textContent = 'Checking...';
  fb.className = 'slug-feedback checking';

  slugCheckTimer = setTimeout(async () => {
    try {
      const res = await fetch('/api/slug-check?slug=' + encodeURIComponent(val));
      const data = await res.json();
      if (data.available) {
        fb.textContent = '✓ ' + val + '.getbotpacks.com is available!';
        fb.className = 'slug-feedback ok';
        slugAvailable = true;
        btn.disabled = false;
        currentSlug = val;
      } else {
        fb.textContent = data.reason || 'That address is taken — try another.';
        fb.className = 'slug-feedback error';
      }
    } catch {
      fb.textContent = 'Could not check availability. Please try again.';
      fb.className = 'slug-feedback error';
    }
  }, 450);
});

// ── Step 0 → 1 ────────────────────────────────────────────────
document.getElementById('ob-step0-next').addEventListener('click', function() {
  if (!slugAvailable) return;
  currentSlug = document.getElementById('ob-slug').value.trim();
  setStep(1);
});

// ── Step 1 → provision ────────────────────────────────────────
document.getElementById('ob-step1-next').addEventListener('click', async function() {
  const pw  = document.getElementById('ob-password').value;
  const pw2 = document.getElementById('ob-password-confirm').value;
  const err = document.getElementById('pw-error');
  err.textContent = '';

  if (pw.length < 8) { err.textContent = 'Password must be at least 8 characters.'; return; }
  if (pw !== pw2)    { err.textContent = 'Passwords do not match.'; return; }

  await provisionBoard(pw);
});

document.getElementById('ob-step1-back').addEventListener('click', function() {
  setStep(0);
});

// ── Provision ─────────────────────────────────────────────────
async function provisionBoard(password) {
  const btn = document.getElementById('ob-step1-next');
  btn.disabled = true;
  btn.textContent = 'Creating your Pal...';

  const slug = currentSlug || document.getElementById('ob-slug').value.trim();

  try {
    const res = await fetch('/api/boards/provision?_pal=' + encodeURIComponent(slug), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        slug,
        name: 'Pal',
        theme: 'light',
        password,
        tier: 'starter',
        ref: (function(){ try { return localStorage.getItem('pal_ref') || undefined; } catch { return undefined; } })()
      })
    });

    const data = await res.json();

    if (res.ok) {
      // Server-side login to get httpOnly cookie — _pal param lets board middleware resolve
      try {
        await fetch('/api/auth/login?_pal=' + encodeURIComponent(slug), {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password, slug })
        });
      } catch { /* non-fatal — user can log in manually */ }

      const urlEl = document.getElementById('ob-board-url');
      if (urlEl) urlEl.textContent = data.board?.url || (slug + '.getbotpacks.com');
      setStep(2);
    } else {
      const msg = data.errors ? data.errors.join(', ') : (data.error || 'Could not create — please try again.');
      document.getElementById('pw-error').textContent = msg;
    }
  } catch {
    document.getElementById('pw-error').textContent = 'Network error. Please try again.';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Create my Pal →';
  }
}

// ── Step 2: go to chat ────────────────────────────────────────
document.getElementById('ob-start-chat').addEventListener('click', function() {
  const slug = currentSlug || document.getElementById('ob-slug').value.trim();
  if (slug) window.location.href = 'https://' + slug + '.getbotpacks.com';
});

// ── Ref tracking ──────────────────────────────────────────────
(function() {
  try {
    const ref = new URLSearchParams(window.location.search).get('ref');
    if (ref) localStorage.setItem('pal_ref', ref.toLowerCase());
  } catch {}
})();
</script>
</body>
</html>
